<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico?v=2" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png?v=2" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta
      name="description"
      content="Staff dashboard"
    />
    <title>Staff dashboard</title>
    <script>
      // Diagnostic: surface any boot-time JS error that would
      // otherwise leave #root empty with no visible feedback. If the
      // React tree mounts within 2.5s, this script does nothing.
      window.__bootErrors = [];
      window.addEventListener('error', function(e) {
        window.__bootErrors.push('ERR ' + (e.error && e.error.stack || e.message) + ' @ ' + e.filename + ':' + e.lineno);
      });
      window.addEventListener('unhandledrejection', function(e) {
        window.__bootErrors.push('REJ ' + (e.reason && e.reason.stack || e.reason));
      });
      setTimeout(function() {
        var root = document.getElementById('root');
        if (root && root.children.length === 0 && window.__bootErrors.length) {
          var esc = function(s){return String(s).replace(/[<>&]/g, function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c];});};
          root.innerHTML = '<pre style="padding:24px;font-family:ui-monospace,monospace;color:#c0392b;background:#fff;white-space:pre-wrap;word-break:break-word;">React did not mount. Errors:\n\n' + window.__bootErrors.map(esc).join('\n\n---\n\n') + '</pre>';
        }
      }, 2500);
    </script>
    <script>
      // Apply dev mode custom labels before React renders (prevents text flash)
      try {
        var labels = JSON.parse(localStorage.getItem('dev_custom_labels') || '{}');
        if (Object.keys(labels).length > 0) {
          var applyEarly = function() {
            var containers = document.querySelectorAll('.main-content, .sidebar-nav, .app-title');
            containers.forEach(function(c) {
              var walker = document.createTreeWalker(c, NodeFilter.SHOW_TEXT, null, false);
              while (walker.nextNode()) {
                var node = walker.currentNode;
                var text = node.textContent.trim();
                if (!text) continue;
                for (var key in labels) {
                  var orig = key.split('__').pop();
                  if (orig && text === orig && text !== labels[key]) {
                    node.textContent = node.textContent.replace(orig, labels[key]);
                    break;
                  }
                }
              }
            });
          };
          // Run as soon as DOM is ready and periodically for first 3 seconds
          document.addEventListener('DOMContentLoaded', function() {
            applyEarly();
            var count = 0;
            var iv = setInterval(function() { applyEarly(); if (++count > 15) clearInterval(iv); }, 200);
          });
        }
      } catch(e) {}
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      code {
        font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
          monospace;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
