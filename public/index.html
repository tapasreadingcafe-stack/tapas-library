<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta
      name="description"
      content="Staff dashboard"
    />
    <title>Staff dashboard</title>
    <script>
      // Apply dev mode custom labels before React renders (prevents text flash)
      try {
        var labels = JSON.parse(localStorage.getItem('dev_custom_labels') || '{}');
        if (Object.keys(labels).length > 0) {
          var applyEarly = function() {
            var containers = document.querySelectorAll('.main-content, .sidebar-nav, .app-title');
            containers.forEach(function(c) {
              var walker = document.createTreeWalker(c, NodeFilter.SHOW_TEXT, null, false);
              while (walker.nextNode()) {
                var node = walker.currentNode;
                var text = node.textContent.trim();
                if (!text) continue;
                for (var key in labels) {
                  var orig = key.split('__').pop();
                  if (orig && text === orig && text !== labels[key]) {
                    node.textContent = node.textContent.replace(orig, labels[key]);
                    break;
                  }
                }
              }
            });
          };
          // Run as soon as DOM is ready and periodically for first 3 seconds
          document.addEventListener('DOMContentLoaded', function() {
            applyEarly();
            var count = 0;
            var iv = setInterval(function() { applyEarly(); if (++count > 15) clearInterval(iv); }, 200);
          });
        }
      } catch(e) {}
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      code {
        font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
          monospace;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
