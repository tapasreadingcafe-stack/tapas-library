name: Visual regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Playwright + pixelmatch + pngjs are dev-only for this job —
      # avoid bloating the main package.json's devDependencies until
      # the harness stabilises.
      - name: Install storefront deps
        working-directory: tapas-store
        run: npm ci

      - name: Install visual suite deps
        run: npm install --no-save playwright pixelmatch pngjs

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Start storefront
        working-directory: tapas-store
        env:
          # CRA defaults to port 3000; pin 3001 to match the local dev
          # convention and the harness's TAPAS_STORE_URL below.
          PORT: 3001
          BROWSER: none
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
        run: |
          npm start &
          # Wait for CRA to come up; 90s ceiling so the job fails
          # fast if there's an earlier build error.
          npx wait-on --timeout 90000 http://localhost:3001

      - name: Run visual regression
        env:
          TAPAS_STORE_URL: http://localhost:3001
        run: node tests/visual/run.mjs

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-report
          path: tests/visual/output/
          retention-days: 14
